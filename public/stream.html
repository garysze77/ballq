<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-container { width: 100%; height: 100%; }
        .vjs-big-play-centered { width: 100% !important; height: 100% !important; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div class="video-container">
        <video
            id="player"
            class="video-js vjs-big-play-centered"
            playsinline
            controls
            autoplay
            style="width:100%;height:100%;object-fit:contain;"
        ></video>
    </div>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url');

        if (streamUrl) {
            const player = videojs('player', {
                autoplay: true,
                controls: true,
                responsive: true,
                fluid: true,
                sources: [{
                    src: streamUrl,
                    type: 'application/x-mpegURL'
                }]
            });

            player.on('error', function() {
                console.log('Player error:', player.error());
            });
        } else {
            document.body.innerHTML = '<p style="color:white;padding:20px;">No stream URL provided</p>';
        }
    </script>
</body>
</html>
