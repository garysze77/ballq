<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    </style>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url');

        if (streamUrl) {
            // If it's an m3u8 URL, try to embed via iframe to embedsports.top
            // Otherwise just redirect
            if (streamUrl.includes('.m3u8')) {
                // For m3u8, we need to go through the original embed flow
                // Get the match ID from the URL
                const urlObj = new URL(streamUrl);
                // Just show an error for now - need to go back to iframe approach
                document.body.innerHTML = '<p style="color:#ff6666;padding:20px;text-align:center;">Stream not available directly. Please use the main site.</p><p style="color:#888;padding:20px;text-align:center;"><a href="/" style="color:#4a9eff;">Go back</a></p>';
            } else {
                // Direct iframe embed
                document.body.innerHTML = '<iframe src="' + streamUrl + '" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>';
            }
        } else {
            document.body.innerHTML = '<p style="color:white;padding:20px;">No stream URL</p>';
        }
    </script>
</body>
</html>
